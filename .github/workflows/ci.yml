name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  reviewable-pr-diff:
    name: PR has reviewable file changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Reject empty pull requests
        run: >-
          ./scripts/check-pr-reviewable-diff.sh
          "${{ github.event.pull_request.base.sha }}"
          "${{ github.event.pull_request.head.sha }}"

  unit-tests:
    name: Unit tests (engine-agnostic Core, headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # OkPlayer.Core + OkPlayer.Tests are plain net9.0 (no WinUI), so they build and run anywhere —
      # this catches logic regressions (chapter math, history sidecar, settings) fast and cheaply.
      - name: Test
        run: dotnet test tests/OkPlayer.Tests/OkPlayer.Tests.csproj -c Release --logger "console;verbosity=normal"

  integration-tests:
    name: Integration tests (real libmpv + render-thread guard)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # These exercise the actual engine (the open-time deadlock guard contract), so they need libmpv.
      - name: Fetch libmpv
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # authenticates the api.github.com release lookup (5000/hr vs the 60/hr unauthenticated limit that 403s on shared runner IPs)
        run: ./scripts/fetch-natives.ps1

      # Debug so the (DEBUG-only) render-thread guard is compiled in and its assertions run.
      - name: Test
        run: dotnet test tests/OkPlayer.IntegrationTests/OkPlayer.IntegrationTests.csproj -c Debug --logger "console;verbosity=normal"

  powershell-lint:
    name: PowerShell lint (bootstrap + repo scripts)
    runs-on: ubuntu-latest # pwsh is preinstalled; the scripts are parsed/analyzed, not executed
    steps:
      - uses: actions/checkout@v4

      # Static checks only, so lint runs cheaply off-Windows. Two layers guard the bootstrap scripts:
      #   1. AST parse of every .ps1 — catches syntax errors that would only surface on a real VM run.
      #   2. PSScriptAnalyzer at Error severity — flags real defects without failing on the repo's
      #      deliberate Write-Host style (a Warning-severity rule), so existing scripts stay green.
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop

      - name: Parse + analyze PowerShell scripts
        shell: pwsh
        run: |
          $scripts = Get-ChildItem -Path scripts, installer -Filter *.ps1 -Recurse -File
          $failed = $false
          foreach ($s in $scripts) {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($s.FullName, [ref]$null, [ref]$errors) | Out-Null
            if ($errors) {
              $failed = $true
              Write-Host "::error file=$($s.FullName)::$($errors.Count) parse error(s)"
              $errors | ForEach-Object { Write-Host "  $($_.Extent.StartLineNumber): $($_.Message)" }
            }
          }
          # Invoke-ScriptAnalyzer -Path binds a single string, so analyze each root separately. Passing an
          # array would fail parameter binding, and under the pwsh shell's default ErrorActionPreference=Stop
          # that non-terminating error aborts the whole job before any real finding is evaluated.
          $findings = foreach ($root in 'scripts', 'installer') {
            Invoke-ScriptAnalyzer -Path $root -Recurse -Severity Error
          }
          if ($findings) {
            $failed = $true
            $findings | Format-Table -AutoSize | Out-String | Write-Host
          }
          if ($failed) { throw 'PowerShell lint failed (see parse errors / analyzer findings above).' }
          Write-Host "Parsed and analyzed $($scripts.Count) PowerShell script(s); no errors."

      - name: Test Windows bootstrap regressions
        shell: pwsh
        run: ./scripts/tests/windows-dev-vs-probe.Tests.ps1

name: Linux Release

on:
  push:
    tags:
      - 'linux-v*'
  workflow_dispatch:
    inputs:
      version:
        description: Linux package version, for example 0.1.0-linux-alpha.1
        required: true
        type: string
      publish:
        description: Publish to GitHub Releases
        required: true
        default: false
        type: boolean
      prerelease:
        description: Mark GitHub Release as pre-release
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  linux-release:
    name: Package Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#linux-v}"
            publish="true"
            prerelease="true"
          else
            version="${{ inputs.version }}"
            tag="linux-v${version}"
            publish="${{ inputs.publish }}"
            prerelease="${{ inputs.prerelease }}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-4-dev libadwaita-1-dev libmpv-dev libgl1-mesa-dev libegl1-mesa-dev libglx-dev mpv ffmpeg cmake ninja-build dpkg-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: rust

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Test Rust workspace
        working-directory: rust
        run: cargo test --workspace

      - name: Build Velopack AppImage lane
        run: ./scripts/package-linux-velopack.sh "${{ steps.release.outputs.version }}"

      - name: Build Debian package lane
        run: ./scripts/package-linux-deb.sh "${{ steps.release.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ok-player-linux-${{ steps.release.outputs.version }}
          path: |
            artifacts/linux/velopack/**
            artifacts/linux/deb/*.deb

      - name: Publish Velopack AppImage feed
        if: steps.release.outputs.publish == 'true'
        run: |
          "$HOME/.dotnet/tools/vpk" upload github \
            --outputDir artifacts/linux/velopack \
            --channel linux \
            --repoUrl "https://github.com/${{ github.repository }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --publish true \
            --pre "${{ steps.release.outputs.prerelease }}" \
            --releaseName "OK Player Linux ${{ steps.release.outputs.version }}" \
            --tag "${{ steps.release.outputs.tag }}" \
            --targetCommitish "${{ github.sha }}"

      - name: Attach Debian package to release
        if: steps.release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.release.outputs.tag }}" artifacts/linux/deb/*.deb --clobber

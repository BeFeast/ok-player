<!doctype html>
<!-- Minimal home for the GitHub Pages site whose real job is serving the OK Player update
     feeds under /updates/ (win: releases.win.json, issue #131; linux: releases.linux.json +
     deb.linux.json, issue #162), all deployed by publish-update-feeds.yml.
     A proper product landing page (PR #105) can replace this file without touching the feeds. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OK Player</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center;
           font-family: system-ui, sans-serif; background: #101416; color: #e8ecec; }
    main { text-align: center; padding: 2rem; }
    h1 { font-weight: 600; letter-spacing: .02em; }
    h1 span { color: #10938A; }
    a { color: #10938A; }
    p { color: #9fb0af; }
  </style>
</head>
<body>
  <main>
    <h1><span>OK</span> Player</h1>
    <p>A friendly media player for Windows and Linux.</p>
    <p>
      <a href="https://github.com/BeFeast/ok-player">Source on GitHub</a> ·
      <a href="https://github.com/BeFeast/ok-player/releases">Downloads</a>
    </p>
  </main>
</body>
</html>

name: Rust

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: Rust workspace (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-4-dev libadwaita-1-dev libmpv-dev libgl1-mesa-dev libegl1-mesa-dev libglx-dev mpv ffmpeg cmake ninja-build

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          cache-workspaces: rust

      - name: Format
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        working-directory: rust
        run: cargo test --workspace

      - name: Native file dialog result smoke
        run: ./scripts/smoke-linux-file-dialog.sh

      - name: Generate 4K60 HEVC Main10 profile fixture
        env:
          OKP_4K60_FRAMES: 1
        run: ./scripts/profile-linux-4k60.sh generate "$RUNNER_TEMP/ok-player-4k60"

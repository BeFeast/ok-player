name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit-tests:
    name: Unit tests (engine-agnostic Core, headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # OkPlayer.Core + OkPlayer.Tests are plain net9.0 (no WinUI), so they build and run anywhere —
      # this catches logic regressions (chapter math, history sidecar, settings) fast and cheaply.
      - name: Test
        run: dotnet test tests/OkPlayer.Tests/OkPlayer.Tests.csproj -c Release --logger "console;verbosity=normal"

  integration-tests:
    name: Integration tests (real libmpv + render-thread guard)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # These exercise the actual engine (the open-time deadlock guard contract), so they need libmpv.
      - name: Fetch libmpv
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # authenticates the api.github.com release lookup (5000/hr vs the 60/hr unauthenticated limit that 403s on shared runner IPs)
        run: ./scripts/fetch-natives.ps1

      # Debug so the (DEBUG-only) render-thread guard is compiled in and its assertions run.
      - name: Test
        run: dotnet test tests/OkPlayer.IntegrationTests/OkPlayer.IntegrationTests.csproj -c Debug --logger "console;verbosity=normal"

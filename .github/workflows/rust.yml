name: Rust

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: Rust workspace (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-4-dev libadwaita-1-dev libmpv-dev libgl1-mesa-dev libegl1-mesa-dev libglx-dev mpv ffmpeg cmake ninja-build appstream appstream-compose squashfs-tools unzip

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          cache-workspaces: rust

      - name: Format
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        working-directory: rust
        env:
          OKP_RUN_VELOPACK_PACK_TEST: 1
        run: cargo test --workspace

      - name: AppStream MetaInfo validation smoke
        run: ./scripts/smoke-linux-appstream.sh

      - name: Native file dialog result smoke
        run: ./scripts/smoke-linux-file-dialog.sh

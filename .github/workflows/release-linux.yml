name: Linux Release

# Release cadence (https://github.com/BeFeast/ok-player/issues/130): Linux releases
# are cut in batches — at most daily, or on demand — by pushing a `linux-v*` tag or
# dispatching this workflow manually. Merges to `main` do NOT release; never tag one
# release per commit. The Windows app's Velopack updater only inspects the 10 newest
# GitHub releases, so per-commit Linux pre-releases flooded the Windows update feed
# out of its discovery window and every installed Windows build silently stopped
# seeing updates. The "Bridge Windows update feed" step below is the recovery for
# the already-installed fleet; the batch cadence keeps the release list from being
# dominated by any single track again.

on:
  push:
    tags:
      - 'linux-v*'
  workflow_dispatch:
    inputs:
      version:
        description: Linux package version, for example 0.1.0-linux-alpha.1
        required: true
        type: string
      publish:
        description: Publish to GitHub Releases
        required: true
        default: false
        type: boolean
      prerelease:
        description: Mark GitHub Release as pre-release
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  linux-release:
    name: Package Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#linux-v}"
            publish="true"
            prerelease="true"
          else
            version="${{ inputs.version }}"
            tag="linux-v${version}"
            publish="${{ inputs.publish }}"
            prerelease="${{ inputs.prerelease }}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-4-dev libadwaita-1-dev libmpv-dev libgl1-mesa-dev libegl1-mesa-dev libglx-dev mpv ffmpeg cmake ninja-build dpkg-dev unzip

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: rust

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Test Rust workspace
        working-directory: rust
        run: cargo test --workspace

      - name: Build Velopack AppImage lane
        run: ./scripts/package-linux-velopack.sh "${{ steps.release.outputs.version }}"

      - name: Build Debian package lane
        run: ./scripts/package-linux-deb.sh "${{ steps.release.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ok-player-linux-${{ steps.release.outputs.version }}
          path: |
            artifacts/linux/velopack/**
            artifacts/linux/deb/*.deb

      - name: Publish Velopack AppImage feed
        if: steps.release.outputs.publish == 'true'
        run: |
          "$HOME/.dotnet/tools/vpk" upload github \
            --outputDir artifacts/linux/velopack \
            --channel linux \
            --repoUrl "https://github.com/${{ github.repository }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --publish true \
            --pre "${{ steps.release.outputs.prerelease }}" \
            --releaseName "OK Player Linux ${{ steps.release.outputs.version }}" \
            --tag "${{ steps.release.outputs.tag }}" \
            --targetCommitish "${{ github.sha }}"

      - name: Attach versioned AppImage to release
        if: steps.release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.release.outputs.tag }}" "artifacts/linux/velopack/OK-Player-${{ steps.release.outputs.version }}-x86_64.AppImage" --clobber

      - name: Attach Debian package to release
        if: steps.release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.release.outputs.tag }}" artifacts/linux/deb/*.deb --clobber

      # Bridge the Windows update feed onto this release
      # (https://github.com/BeFeast/ok-player/issues/130). The installed Windows
      # fleet updates via Velopack 1.2.0 GithubSource (channel "win"), which only
      # fetches the 10 newest GitHub releases (GithubSource.cs hardcodes perPage=10,
      # page=1) and silently skips any release without a releases.win.json asset
      # (GitBase.GetReleaseFeed catches the missing-asset exception and continues) —
      # if none match, the fleet gets an empty feed and reports "up to date" forever.
      # DownloadReleaseEntry resolves a package strictly from the assets of the
      # release that carried the feed json (GitBaseAsset pins the carrying release),
      # so attaching the feed alone is not enough: every nupkg it references must be
      # co-located on the same release. Re-attaching the current win-channel assets
      # to every published Linux release keeps the Windows feed inside the 10-release
      # discovery window with no action from users. Remove this step only once the
      # Windows app has migrated off GithubSource (HttpSource migration) and the
      # installed fleet has picked that migration up — not before.
      - name: Bridge Windows update feed onto this release
        if: steps.release.outputs.publish == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Current Windows release = newest published release tagged v* (never
          # linux-v*) that carries the win feed. Bridged copies on linux-v* releases
          # are deliberately excluded so a stale copy can never shadow a newer
          # Windows release, and we paginate because Windows tags may sit far past
          # the first page of the release list.
          win_tag="$(gh api --paginate "repos/${{ github.repository }}/releases?per_page=100" \
            --jq '.[] | select((.draft | not) and .published_at != null)
                      | select(.tag_name | test("^v[0-9]"))
                      | select(any(.assets[]; .name == "releases.win.json"))
                      | [.published_at, .tag_name] | @tsv' \
            | sort | tail -n 1 | cut -f 2)"
          if [[ -z "${win_tag}" ]]; then
            echo "::error::No Windows release carries releases.win.json; cannot bridge the win update feed (issue #130)."
            exit 1
          fi
          echo "Bridging win-channel assets from ${win_tag}"

          bridge_dir="artifacts/win-bridge"
          mkdir -p "${bridge_dir}"
          gh release download "${win_tag}" --repo "${{ github.repository }}" \
            --pattern "releases.win.json" --dir "${bridge_dir}"

          # The feed pins downloads to the release that carries it, so every package
          # it references (full, and delta where present) must ride along.
          mapfile -t win_packages < <(jq -r '.Assets[].FileName' "${bridge_dir}/releases.win.json" | sort -u)
          if [[ "${#win_packages[@]}" -eq 0 ]]; then
            echo "::error::releases.win.json from ${win_tag} references no packages; refusing to bridge an empty feed."
            exit 1
          fi
          for package in "${win_packages[@]}"; do
            gh release download "${win_tag}" --repo "${{ github.repository }}" \
              --pattern "${package}" --dir "${bridge_dir}"
          done

          gh release upload "${{ steps.release.outputs.tag }}" "${bridge_dir}"/* --clobber

name: Linux Candidate

# Scheduled native-builder handoff for the rolling QA channel (issues #339/#340).
# The self-hosted Ubuntu x86_64 builder produces one verified bundle from exact
# origin/main bytes; publication consumes that bundle without rebuilding. The
# public GitHub Pages feeds are never read or written by this workflow.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      acceptance:
        description: Candidate acceptance recorded in the rolling manifest
        required: true
        default: accepted
        type: choice
        options:
          - accepted
          - pending
          - rejected
      republish_last_bundle:
        description: Republish the last verified bundle even when its SHA is already promoted
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: linux-candidate-native
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Native build and rolling publish
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Skip superseded scheduled SHA
        id: supersession
        if: github.event_name == 'schedule'
        shell: bash
        env:
          REQUESTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          current_main_sha="$(git rev-parse refs/remotes/origin/main)"
          echo "current_main_sha=$current_main_sha" >> "$GITHUB_OUTPUT"
          if [[ "$REQUESTED_SHA" != "$current_main_sha" ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Candidate skipped::superseded by ${current_main_sha}, skipping"
            echo "OKP_CANDIDATE_SKIPPED_SUPERSEDED requested=${REQUESTED_SHA} current=${current_main_sha}"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Preflight bundled-mpv toolchain
        if: steps.supersession.outputs.should_run != 'false'
        env:
          CC: /usr/bin/cc
        run: ./scripts/linux-candidate-toolchain.sh

      - name: Build lock coordinator
        if: steps.supersession.outputs.should_run != 'false'
        env:
          CC: /usr/bin/cc
        run: >-
          cargo build --quiet --manifest-path rust/Cargo.toml
          -p okp-core --bin okp-candidate

      - name: Build and publish exact native bundle
        id: candidate
        if: steps.supersession.outputs.should_run != 'false'
        shell: bash
        env:
          CC: /usr/bin/cc
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OKP_CANDIDATE_ACCEPTANCE: ${{ inputs.acceptance || 'accepted' }}
          OKP_CANDIDATE_FORCE_REPUBLISH: ${{ inputs.republish_last_bundle || 'false' }}
          OKP_CANDIDATE_REPOSITORY: ${{ github.repository }}
          OKP_CANDIDATE_REQUESTED_SHA: ${{ github.sha }}
          OKP_SCRATCH_SESSION: candidate-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          state_dir="${OKP_CANDIDATE_STATE_DIR:-${XDG_STATE_HOME:-$HOME/.local/state}/ok-player-candidate}"
          rust/target/debug/okp-candidate lock-run \
            --lock "$state_dir/build.lock" \
            --owner "$state_dir/build.lock.owner.json" \
            --phase build-and-publish \
            --coalesce \
            -- ./scripts/run-linux-candidate-workflow.sh

      - name: Heartbeat and handoff summary
        if: always()
        shell: bash
        run: |
          set +e
          state_dir="${OKP_CANDIDATE_STATE_DIR:-${XDG_STATE_HOME:-$HOME/.local/state}/ok-player-candidate}"
          phase="unavailable"
          detail="no heartbeat was recorded"
          heartbeat_source_sha=""
          timestamp=""
          if [[ -s "$state_dir/heartbeat.jsonl" ]]; then
            heartbeat="$(tail -n 1 "$state_dir/heartbeat.jsonl" 2>/dev/null)"
            if jq -e 'type == "object"' >/dev/null 2>&1 <<<"$heartbeat"; then
              phase="$(jq -r '.phase // "unavailable"' <<<"$heartbeat")"
              detail="$(jq -r '.note // ""' <<<"$heartbeat")"
              heartbeat_source_sha="$(jq -r '.source_sha // ""' <<<"$heartbeat")"
              timestamp="$(jq -r '.unix_seconds // ""' <<<"$heartbeat")"
            else
              detail="latest heartbeat is not valid JSON"
            fi
          fi

          source_sha="${{ steps.candidate.outputs.source_sha }}"
          [[ -n "$source_sha" ]] || source_sha="$heartbeat_source_sha"
          [[ -n "$source_sha" ]] || source_sha="${{ github.sha }}"
          built_sha="${{ steps.candidate.outputs.build_sha }}"
          [[ -n "$built_sha" ]] || built_sha="$source_sha"
          publication_requested="${{ steps.candidate.outputs.should_publish }}"
          [[ -n "$publication_requested" ]] || publication_requested="not reached"

          superseded="${{ steps.supersession.outputs.should_run }}"
          current_main_sha="${{ steps.supersession.outputs.current_main_sha }}"
          if [[ "$superseded" == "false" ]]; then
            phase="skipped-superseded"
            detail="superseded by ${current_main_sha}, skipping"
          fi

          activity="unavailable"
          stall_after="$(cat "$state_dir/stall-after-seconds" 2>/dev/null)"
          cli="$state_dir/checkout/rust/target/release/okp-candidate"
          if [[ -x "$cli" && "$timestamp" =~ ^[0-9]+$ && "$stall_after" =~ ^[0-9]+$ ]]; then
            age="$(( $(date -u +%s) - timestamp ))"
            if classified="$($cli classify --phase "$phase" --age-seconds "$age" --stall-after "$stall_after" 2>/dev/null)"; then
              activity="$(jq -r '.' <<<"$classified" 2>/dev/null)"
              [[ -n "$activity" ]] || activity="unavailable"
            fi
          fi
          {
            echo "### Linux candidate handoff"
            echo ""
            echo "- locked build/publish step: \`${{ steps.candidate.outcome }}\`"
            echo "- publish result: \`${{ steps.candidate.outputs.publish_result || 'not reached' }}\`"
            echo "- requested SHA: \`${{ steps.candidate.outputs.requested_sha || github.sha }}\`"
            echo "- built SHA: \`${built_sha}\`"
            echo "- current candidate head: \`${{ steps.candidate.outputs.current_sha || steps.supersession.outputs.current_main_sha || 'not revalidated' }}\`"
            echo "- bundle generation: \`${{ steps.candidate.outputs.build_number || 'not reached' }}\`"
            echo "- newest allocated generation: \`${{ steps.candidate.outputs.allocated_build || 'not reached' }}\`"
            echo "- published generation before run: \`${{ steps.candidate.outputs.published_build || 'not read' }}\`"
            echo "- stale reasons: \`${{ steps.candidate.outputs.stale_reasons || '[]' }}\`"
            echo "- latest phase: \`${phase}\`"
            echo "- latest detail: ${detail}"
            echo "- publication requested: \`${publication_requested}\`"
            echo "- heartbeat activity: \`${activity}\`"
            echo "- rolling surface: \`linux-candidate\`"
            echo "- public feed: untouched"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Upload portability smoke failure evidence
        uses: actions/upload-artifact@v4
        if: always() && steps.supersession.outputs.should_run != 'false'
        with:
          name: ok-player-candidate-portability-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/linux/portability-smoke-evidence/**
          if-no-files-found: ignore

      - name: Reclaim candidate scratch
        if: always() && steps.supersession.outputs.should_run != 'false'
        env:
          OKP_SCRATCH_SESSION: candidate-${{ github.run_id }}-${{ github.run_attempt }}
        run: ./scripts/reclaim-ok-player-scratch.sh
